services:
  - type: web
    name: shopsmart
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: ShopSmart
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: Asia/Bangkok
      - key: APP_URL
        sync: false # set to the Render-assigned https://<service>.onrender.com URL (or custom domain) after first deploy
      - key: APP_KEY
        sync: false # generate locally with: php artisan key:generate --show
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: file # database would make entrypoint.sh's `optimize:clear` step (which flushes the cache store) do a network round-trip to Supabase on every single boot — same latency reasoning as the local-dev fix, see README's "Local Environment Notes"
      - key: FILESYSTEM_DISK
        value: public
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: RUN_MIGRATIONS
        value: "true" # entrypoint.sh only runs `migrate --force` when this is true; flip to "false" after the first successful deploy if you'd rather run migrations manually
