; Matches the local dev PHP config — the app's own upload validation allows
; up to 4MB (banner images) / 512KB (favicons), so these must stay above that.
upload_max_filesize = 8M
post_max_size = 10M
memory_limit = 256M
max_execution_time = 60

expose_php = Off

; The base php:8.4-apache image ships with no php.ini at all (only
; php.ini-development/-production templates, neither copied in), so without
; this, opcache runs on its compiled-in defaults: enabled, but
; validate_timestamps=1 means every request pays an extra stat() syscall per
; compiled file to check for source changes. The container image is rebuilt
; fresh on every deploy anyway, so there's nothing to invalidate at runtime —
; safe to skip that check and cache compiled bytecode for the container's
; whole lifetime.
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
